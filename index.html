<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Queen Solver</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header class="header">
    <h1 class="title">♕ N-Queen Solver</h1>
    <p class="subtitle">Backtracking + Forward Checking</p>
  </header>

  <main class="main-content">

    <!-- INPUT -->
    <section class="control-panel">
      <h2>Configuration</h2>

      <label>Board Size</label>
      <input type="number" id="nValue" min="4" max="10" placeholder="4-10">

      <label>Max Solutions</label>
      <input type="number" id="limitValue" placeholder="Optional">

      <button onclick="start()" class="btn">Solve</button>
    </section>

    <!-- CONTROLS -->
    <section class="controls-panel">
      <h2>Navigation</h2>

      <div class="button-group">
        <button onclick="prevSolution()" class="btn">◀ Prev</button>
        <button onclick="nextSolution()" class="btn">Next ▶</button>
        <button onclick="autoPlay()" class="btn" id="autoPlayBtn">Auto ▶▶</button>
        <button onclick="drawAllSolutions()" class="btn">All 📊</button>
      </div>

      <label>Speed</label>
      <input type="range" id="speed" min="50" max="1200" value="400">
    </section>

    <!-- BOARD -->
    <section class="board-section">
      <div id="info"></div>
      <div id="board" class="board-display"></div>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
